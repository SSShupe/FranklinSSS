<div class="share-section">
  <p class="share-label">Share this page:</p>
  <div class="share-buttons">
    <a href="#" class="share-btn share-facebook" title="Share on Facebook" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-facebook-f"></i>
    </a>
    <a href="#" class="share-btn share-bluesky" title="Share on Bluesky" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-bluesky"></i>
    </a>
    <a href="#" class="share-btn share-threads" title="Share on Threads" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-threads"></i>
    </a>
    <a href="#" class="share-btn share-mastodon" title="Share on Mastodon"
      onclick="event.preventDefault(); shareMastodon();">
      <i class="fa-brands fa-mastodon"></i>
    </a>
    <a href="#" class="share-btn share-whatsapp" title="Share via WhatsApp" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-whatsapp"></i>
    </a>
    <a href="#" class="share-btn share-email" title="Share via Email">
      <i class="fa-solid fa-envelope"></i>
    </a>
    <a href="/no-twitter" class="share-btn share-twitter" title="Still on X/Twitter? Read this.">
      <i class="fa-brands fa-x-twitter"></i>
    </a>
  </div>
</div>

<script>
  (function () {
    var url = encodeURIComponent(window.location.href);
    var title = encodeURIComponent(document.title);

    var fb = document.querySelector('.share-facebook');
    if (fb) fb.href = 'https://www.facebook.com/sharer/sharer.php?u=' + url;

    var bsky = document.querySelector('.share-bluesky');
    if (bsky) bsky.href = 'https://bsky.app/intent/compose?text=' + title + '%20' + url;

    var threads = document.querySelector('.share-threads');
    if (threads) threads.href = 'https://www.threads.net/intent/post?text=' + title + '%20' + url;

    var wa = document.querySelector('.share-whatsapp');
    if (wa) wa.href = 'https://api.whatsapp.com/send?text=' + title + '%20' + url;

    var mail = document.querySelector('.share-email');
    if (mail) mail.href = 'mailto:?subject=' + title + '&body=' + url;
  })();

  function shareMastodon() {
    var instance = prompt('Enter your Mastodon server (e.g. mastodon.social):');
    if (!instance) return;
    instance = instance.replace(/^https?:\/\//, '').replace(/\/$/, '');
    var text = encodeURIComponent(document.title + ' ' + window.location.href);
    window.open('https://' + instance + '/share?text=' + text, '_blank', 'noopener,noreferrer');
  }
</script>
